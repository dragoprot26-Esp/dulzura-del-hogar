<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dulzura del Hogar — Artesanías y comidas caseras con amor">
  <meta name="theme-color" content="#3d1f10">
  <title>Dulzura del Hogar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="mainNavbar">
  <a class="navbar-brand" href="index.html" id="navBrand">
    <img id="navLogoImg" src="" alt="Logo" style="width:36px;height:36px;border-radius:8px;object-fit:cover;display:none;">
    <span id="navLogoEmoji" style="font-size:1.5rem;">🍰</span>
    <span id="navNombreApp">Dulzura del Hogar</span>
  </a>
  <div class="navbar-actions">
    <button class="btn btn-outline" id="btnLoginAdmin">🔐 Admin</button>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="hero-logo" id="heroLogo">🍰</div>
  <h1 id="heroTitulo">Dulzura del Hogar</h1>
  <p>Artesanías y comidas caseras elaboradas con amor ✨</p>
</header>

<!-- MAIN -->
<main class="main-layout">
  <section>
    <h2 class="section-title">Nuestros productos</h2>
    <div class="productos-grid" id="productos">
      <div class="text-center text-muted" style="padding:40px;grid-column:1/-1;">
        <div style="font-size:2.5rem;">🍬</div><p>Cargando productos...</p>
      </div>
    </div>
  </section>
  <aside class="aside-promos">
    <h2 class="section-title" style="font-size:1.05rem;">Promociones</h2>
    <div id="contenidoPromos"></div>
  </aside>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-links">
    <a id="linkWA" href="#" target="_blank" rel="noopener">📱 WhatsApp</a>
    <a id="linkMail" href="#">✉️ Correo</a>
  </div>
  <div id="licenciaInfo"></div>
  <p style="font-size:0.73rem;opacity:0.45;margin-top:8px;">© 2025 Dulzura del Hogar</p>
</footer>

<!-- MODAL LOGIN -->
<div class="modal-overlay" id="modalLogin">
  <div class="modal">
    <button class="modal-close" aria-label="Cerrar">✕</button>
    <h2 class="modal-titulo">🔐 Acceso Administrador</h2>
    <div id="loginError" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:0.85rem;font-weight:700;"></div>
    <div class="form-group">
      <label for="loginUser">Usuario</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="loginPass">Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••">
    </div>
    <button class="btn btn-primary btn-block" id="loginBtn">Ingresar →</button>
    <button class="btn btn-ghost btn-block" id="recuperarBtn" style="margin-top:10px;font-size:0.82rem;">¿Olvidé mi contraseña?</button>
  </div>
</div>

<!-- MODAL PEDIDO -->
<div class="modal-overlay" id="modalPedido">
  <div class="modal">
    <button class="modal-close" aria-label="Cerrar">✕</button>
    <h2 class="modal-titulo">🛒 Hacer un encargo</h2>
    <div style="background:var(--primary-light);border-radius:10px;padding:12px 16px;margin-bottom:14px;">
      <div style="font-weight:700;color:var(--primary-dark);" id="pedidoProductoNombre">Producto</div>
      <div style="color:var(--primary);font-size:1.1rem;font-weight:700;" id="pedidoPrecio"></div>
    </div>
    <div id="pedidoError" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:0.85rem;font-weight:700;"></div>
    <div class="form-group">
      <label for="pedidoNombre">Tu nombre *</label>
      <input type="text" id="pedidoNombre" placeholder="Nombre completo">
    </div>
    <div class="form-group">
      <label for="pedidoTelefono">Teléfono *</label>
      <input type="tel" id="pedidoTelefono" placeholder="11 1234-5678">
    </div>
    <div class="form-group">
      <label for="pedidoDireccion">Dirección (opcional)</label>
      <input type="text" id="pedidoDireccion" placeholder="Para envío a domicilio">
    </div>
    <div class="form-group">
      <label for="pedidoCantidad">Cantidad</label>
      <input type="number" id="pedidoCantidad" value="1" min="1" max="99">
    </div>
    <input type="hidden" id="pedidoProductoId">
    <button class="btn btn-primary btn-block" id="enviarPedido" style="margin-top:6px;">📨 Enviar encargo</button>
  </div>
</div>

<script src="js/comun.js"></script>
<script src="js/licencia.js"></script>
<script src="js/index.js"></script>
</body>
</html>
